version: "2"
type: backend
tech_stack:
  - Go
  - Fiber (HTTP framework)
  - PostgreSQL (Supabase)
  - gRPC (agent communication)
  - Docker (container management on agents)
  - Supabase Auth (JWT authentication)
features:
  - name: Authentication
    description: User registration, login, and profile management via Supabase JWT
    files:
      - services/master/internal/api/auth.go
      - services/master/internal/api/middleware.go
    endpoints:
      - method: POST
        path: /api/v1/auth/register
        description: Register a new user
        auth_required: false
        response_schema:
          "201": User object
          "400": Validation error
      - method: POST
        path: /api/v1/auth/login
        description: Login user
        auth_required: false
        response_schema:
          "200": User object with token
          "401": Invalid credentials
      - method: GET
        path: /api/v1/auth/me
        description: Get current user profile
        auth_required: true
        response_schema:
          "200": User object
      - method: PUT
        path: /api/v1/auth/me
        description: Update user profile
        auth_required: true
        request_schema:
          body:
            username: string
        response_schema:
          "200": Updated user
    depends_on: []

  - name: Node Management
    description: Admin-only CRUD for infrastructure nodes running the IronHost Agent
    files:
      - services/master/internal/api/nodes.go
      - services/master/internal/database/nodes.go
      - services/master/internal/grpc/client.go
    endpoints:
      - method: GET
        path: /api/v1/nodes
        description: List all nodes
        auth_required: true
        response_schema:
          "200": "{ nodes: Node[] }"
      - method: GET
        path: /api/v1/nodes/:id
        description: Get a specific node
        auth_required: true
        response_schema:
          "200": "{ node: Node }"
      - method: POST
        path: /api/v1/nodes
        description: Register a new node
        auth_required: true
        request_schema:
          body:
            name: string
            fqdn: string
            grpc_port: number
            memory_total: number
            disk_total: number
            daemon_token: string
        response_schema:
          "201": "{ node: Node, daemon_token: string }"
      - method: POST
        path: /api/v1/nodes/probe
        description: Probe an agent to verify connectivity and get system stats
        auth_required: true
        request_schema:
          body:
            fqdn: string
            grpc_port: number
            daemon_token: string
        response_schema:
          "200": "{ success: boolean, reachable: boolean, stats: NodeStats }"
      - method: PUT
        path: /api/v1/nodes/:id
        description: Update node configuration
        auth_required: true
        response_schema:
          "200": "{ message: string }"
      - method: DELETE
        path: /api/v1/nodes/:id
        description: Delete a node
        auth_required: true
        response_schema:
          "200": "{ message: string }"
      - method: GET
        path: /api/v1/nodes/:id/stats
        description: Get real-time resource stats from a node via gRPC
        auth_required: true
        response_schema:
          "200": "{ stats: NodeStats }"
          "503": Agent unreachable
    depends_on:
      - Authentication

  - name: Server Management
    description: CRUD and lifecycle management for game server containers
    files:
      - services/master/internal/api/servers.go
      - services/master/internal/models/server.go
    endpoints:
      - method: GET
        path: /api/v1/servers
        description: List servers for the authenticated user
        auth_required: true
        response_schema:
          "200": "{ servers: Server[] }"
      - method: GET
        path: /api/v1/servers/:id
        description: Get a specific server (owner only)
        auth_required: true
        response_schema:
          "200": "{ server: Server }"
      - method: POST
        path: /api/v1/servers
        description: Create a new game server
        auth_required: true
        request_schema:
          body:
            name: string
            node_id: string
            memory_limit: number
            cpu_limit: number
            disk_limit: number
        response_schema:
          "201": "{ server: Server }"
          "400": Resource validation error
          "402": Insufficient coins
      - method: PUT
        path: /api/v1/servers/:id
        description: Update server name and resources
        auth_required: true
        request_schema:
          body:
            name: string
            memory_limit: number
            cpu_limit: number
            disk_limit: number
        response_schema:
          "200": "{ server: Server }"
      - method: DELETE
        path: /api/v1/servers/:id
        description: Delete a server
        auth_required: true
        response_schema:
          "200": "{ message: string }"
      - method: POST
        path: /api/v1/servers/:id/start
        description: Start a stopped server
        auth_required: true
        response_schema:
          "200": "{ message: string }"
      - method: POST
        path: /api/v1/servers/:id/stop
        description: Stop a running server
        auth_required: true
        response_schema:
          "200": "{ message: string }"
      - method: POST
        path: /api/v1/servers/:id/restart
        description: Restart a server
        auth_required: true
        response_schema:
          "200": "{ message: string }"
      - method: POST
        path: /api/v1/servers/:id/reset
        description: Reset (wipe and recreate) a server container
        auth_required: true
        response_schema:
          "200": "{ message: string }"
      - method: POST
        path: /api/v1/servers/:id/command
        description: Send a console command to the server
        auth_required: true
        request_schema:
          body:
            command: string
        response_schema:
          "200": "{ message: string, output: string }"
      - method: GET
        path: /api/v1/servers/:id/logs
        description: Get recent server logs
        auth_required: true
        response_schema:
          "200": "{ logs: string[] }"
    depends_on:
      - Authentication
      - Node Management

  - name: Billing System
    description: Plans, subscriptions, IHC coin economy, and resource purchasing
    files:
      - services/master/internal/api/billing.go
    endpoints:
      - method: GET
        path: /api/v1/billing/plans
        description: List available plans
        auth_required: false
        response_schema:
          "200": "{ plans: Plan[] }"
      - method: GET
        path: /api/v1/billing/subscription
        description: Get user subscription details
        auth_required: true
        response_schema:
          "200": "{ plan: Plan, coin_balance_granted: number }"
      - method: POST
        path: /api/v1/billing/subscribe
        description: Subscribe to a plan
        auth_required: true
        request_schema:
          body:
            plan_id: string
        response_schema:
          "200": Success
      - method: GET
        path: /api/v1/billing/coins
        description: Get coin balance
        auth_required: true
        response_schema:
          "200": CoinBalance
      - method: POST
        path: /api/v1/billing/coins/earn
        description: Earn coins
        auth_required: true
        request_schema:
          body:
            amount: number
        response_schema:
          "200": Success
      - method: POST
        path: /api/v1/billing/coins/purchase
        description: Purchase coins with a package
        auth_required: true
        request_schema:
          body:
            package_id: string
        response_schema:
          "200": Success
      - method: GET
        path: /api/v1/billing/resources
        description: List resource packages available for purchase
        auth_required: true
        response_schema:
          "200": "{ packages: ResourcePackage[] }"
      - method: POST
        path: /api/v1/billing/resources/purchase
        description: Purchase a resource package
        auth_required: true
        request_schema:
          body:
            package_id: string
        response_schema:
          "200": Success
      - method: GET
        path: /api/v1/billing/maintenance
        description: Get maintenance cost breakdown for all servers
        auth_required: true
        response_schema:
          "200": "{ servers: ServerCost[], total_monthly: number }"
      - method: POST
        path: /api/v1/billing/maintenance/estimate
        description: Estimate the maintenance cost for a server config
        auth_required: true
        request_schema:
          body:
            memory_limit: number
            cpu_limit: number
            disk_limit: number
        response_schema:
          "200": CostEstimate
    depends_on:
      - Authentication

  - name: Allocations
    description: Admin-only port allocation management for nodes
    files:
      - services/master/internal/api/nodes.go
    endpoints:
      - method: GET
        path: /api/v1/allocations
        description: List allocations
        auth_required: true
        response_schema:
          "200": "{ allocations: [] }"
      - method: POST
        path: /api/v1/allocations
        description: Create port allocations
        auth_required: true
        request_schema:
          body:
            node_id: string
            ip_address: string
            port_start: number
            port_end: number
        response_schema:
          "201": "{ message: string, count: number }"
      - method: DELETE
        path: /api/v1/allocations/:id
        description: Delete an allocation
        auth_required: true
        response_schema:
          "200": "{ message: string }"
    depends_on:
      - Authentication
      - Node Management

known_limitations:
  - issue: Node Get endpoint returns nil node instead of fetching from DB
    location: services/master/internal/api/nodes.go
    impact: GET /nodes/:id always returns null
  - issue: Node Update endpoint is a stub that does nothing
    location: services/master/internal/api/nodes.go
    impact: PUT /nodes/:id does not persist changes
  - issue: gRPC client pool caches connections without TTL or health checks
    location: services/master/internal/grpc/client.go
    impact: Stale connections may cause failures if agent restarts
